# This workflow tests the feature of using an external MongoDB for tests
name: Java Test MongoDB

on:
  push:
    branches:
      - main
  pull_request:
    branches-ignore:
      - release/6.x.x

jobs:
  # Test with real MongoDB
  test-mongodb:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TEST_MONGODB_CONNECTION_STRING: mongodb://test:example@localhost:27017/testdb?authSource=admin
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'gradle'

      - name: Start MongoDB
        run: docker run -d -e MONGO_INITDB_ROOT_USERNAME=test -e MONGO_INITDB_ROOT_PASSWORD=example -p 27017:27017 --name test_mongo mongo:4.2.24

      - name: Test with Gradle
        run: ./gradlew :sda-commons-starter-mongodb:test

      - name: Assert use of MongoDB
        run: "docker logs test_mongo | grep -F 'createCollection' | grep -F 'testdb.'"

      - name: Stop MongoDB
        run: docker stop test_mongo

