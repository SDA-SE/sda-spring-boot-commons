# This workflow checks the code style
name: Spotless

on:
  push:
    branches:
      - main
      - release/6.x.x
  pull_request:

jobs:
  # check code style
  spotless:
    runs-on: ubuntu-latest

    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'gradle'

      - name: Run Spotless
        run: ./gradlew spotlessCheck
